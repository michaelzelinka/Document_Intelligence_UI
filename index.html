<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #47d4ff;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff4747;
    --success: #47ff8a;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--text);
    text-decoration: none;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .api-key-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .api-key-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .api-key-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    width: 240px;
    transition: border-color 0.2s;
    outline: none;
  }

  .api-key-input:focus { border-color: var(--accent); }

  /* Main */
  main {
    flex: 1;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    padding: 60px 40px;
  }

  .hero {
    margin-bottom: 56px;
  }

  .hero h1 {
    font-size: 48px;
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  .hero h1 span { color: var(--accent); }

  .hero p {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
  }

  /* Doc type selector */
  .type-selector {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }

  .type-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .type-btn:hover { border-color: #444; color: var(--text); }

  .type-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232, 255, 71, 0.05);
  }

  .type-btn svg { width: 16px; height: 16px; }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 48px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: var(--surface);
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(232, 255, 71, 0.03);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    width: 40px; height: 40px;
    margin: 0 auto 16px;
    color: var(--muted);
  }

  .upload-zone h3 {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .upload-zone p {
    font-size: 13px;
    color: var(--muted);
  }

  .file-selected {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
  }

  /* Submit button */
  .submit-btn {
    margin-top: 16px;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .submit-btn:hover { background: #d4eb30; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Loading */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    margin-top: 20px;
    padding: 14px 18px;
    background: rgba(255, 71, 71, 0.08);
    border: 1px solid rgba(255, 71, 71, 0.3);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--danger);
    display: none;
  }

  /* Results */
  .results {
    margin-top: 48px;
    display: none;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .results-title {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .extraction-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .card.full { grid-column: 1 / -1; }

  .card-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .card-value {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    word-break: break-word;
  }

  .card-value.accent { color: var(--accent); font-size: 22px; }
  .card-value.mono { font-family: var(--mono); font-size: 13px; }

  /* Parties */
  .parties-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .party-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text);
  }

  .party-tag::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Risk flags */
  .flags-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .flag-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    color: #e0c97a;
    line-height: 1.5;
  }

  .flag-item::before {
    content: '⚠';
    flex-shrink: 0;
    margin-top: 1px;
  }

  .flag-item.info { color: var(--accent2); }
  .flag-item.info::before { content: 'ℹ'; }

  /* Orders / Line items table */
  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: top;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* JSON toggle */
  .json-toggle {
    margin-top: 16px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .json-toggle:hover { border-color: #444; color: var(--text); }

  .json-block {
    margin-top: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    color: #a0a0a0;
    overflow-x: auto;
    white-space: pre;
    display: none;
  }

  /* Supplier/client block */
  .entity-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .entity-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .entity-detail {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    main { padding: 32px 20px; }
    header { padding: 16px 20px; flex-direction: column; gap: 12px; align-items: flex-start; }
    .hero h1 { font-size: 32px; }
    .cards-grid { grid-template-columns: 1fr; }
    .card.full { grid-column: 1; }
    .api-key-input { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <span class="logo-dot"></span>
    DOCUMENT INTELLIGENCE
  </a>
  <div class="api-key-wrapper">
    <span class="api-key-label">API Key</span>
    <input class="api-key-input" type="password" id="apiKey" placeholder="Enter your API key" />
  </div>
</header>

<main>
  <div class="hero">
    <h1>Extract <span>structured data</span><br>from any document.</h1>
    <p>Upload a PDF contract or invoice and get back clean, structured JSON in seconds.</p>
  </div>

  <!-- Type selector -->
  <div class="type-selector">
    <button class="type-btn active" data-type="contract" onclick="selectType('contract', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      Contract
    </button>
    <button class="type-btn" data-type="invoice" onclick="selectType('invoice', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 14l2 2 4-4m-7 8h10a2 2 0 002-2V7a2 2 0 00-2-2H9L5 9v11a2 2 0 002 2z"/></svg>
      Invoice
    </button>
  </div>

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".pdf" onchange="onFileSelect(this)" />
    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
      <path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
    </svg>
    <h3 id="uploadTitle">Drop your PDF here</h3>
    <p id="uploadSub">or click to browse — PDF only</p>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitDocument()" disabled>
    <span class="spinner" id="spinner"></span>
    <span id="submitLabel">Analyse document</span>
  </button>

  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div class="results" id="results"></div>
</main>

<script>
let selectedType = 'contract';
let selectedFile = null;

function selectType(type, btn) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function onFileSelect(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  selectedFile = file;
  updateUploadZone(file.name);
  document.getElementById('submitBtn').disabled = false;
}

function updateUploadZone(name) {
  document.getElementById('uploadTitle').textContent = '';
  document.getElementById('uploadSub').textContent = '';
  document.querySelector('.upload-icon').style.display = 'none';
  const inner = document.getElementById('uploadZone');
  let fileSpan = inner.querySelector('.file-selected');
  if (!fileSpan) {
    fileSpan = document.createElement('div');
    fileSpan.className = 'file-selected';
    inner.appendChild(fileSpan);
  }
  fileSpan.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>${name}`;
}

// Drag and drop
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.pdf')) {
    selectedFile = file;
    updateUploadZone(file.name);
    document.getElementById('submitBtn').disabled = false;
  }
});

async function submitDocument() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showError('Please enter your API key.'); return; }

  const fileInput = document.getElementById('fileInput');
  const file = selectedFile || (fileInput.files && fileInput.files[0]);
  if (!file) { showError('Please select a PDF file.'); return; }

  setLoading(true);
  hideError();

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch(
      `https://document-intelligence-api-1hme.onrender.com/extract?document_type=${selectedType}`,
      { method: 'POST', headers: { 'X-API-Key': apiKey }, body: formData }
    );

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || `Error ${res.status}`);
    renderResults(data);
  } catch (err) {
    showError(err.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('submitLabel').textContent = on ? 'Analysing...' : 'Analyse document';
  document.getElementById('submitBtn').disabled = on;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.style.display = 'block';
}

function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}

function renderResults(data) {
  const { id, document_type, result } = data;
  const container = document.getElementById('results');
  container.style.display = 'block';

  container.innerHTML = `
    <div class="results-header">
      <span class="results-title">${document_type === 'invoice' ? 'Invoice' : 'Contract'} extraction complete</span>
      <span class="extraction-id">id: ${id}</span>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
    <button class="json-toggle" onclick="toggleJson(this)">Show raw JSON</button>
    <pre class="json-block" id="jsonBlock">${JSON.stringify(result, null, 2)}</pre>
  `;

  const grid = document.getElementById('cardsGrid');

  if (document_type === 'contract') {
    renderContractCards(grid, result);
  } else {
    renderInvoiceCards(grid, result);
  }

  container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderContractCards(grid, r) {
  grid.innerHTML = '';

  if (r.parties?.length) {
    grid.innerHTML += card('Parties', `<div class="parties-list">${r.parties.map(p => `<div class="party-tag">${p}</div>`).join('')}</div>`);
  }

  if (r.governing_law) {
    grid.innerHTML += card('Governing Law', `<div class="card-value">${r.governing_law}</div>`);
  }

  if (r.contract_value) {
    grid.innerHTML += card('Contract Value', `<div class="card-value accent">${r.contract_value}</div>`);
  }

  if (r.payment_terms) {
    grid.innerHTML += card('Payment Terms', `<div class="card-value">${r.payment_terms}</div>`);
  }

  if (r.start_date || r.end_date) {
    grid.innerHTML += card('Duration', `
      <div style="display:flex;gap:24px;">
        ${r.start_date ? `<div><div class="card-label">Start</div><div class="card-value mono">${r.start_date}</div></div>` : ''}
        ${r.end_date ? `<div><div class="card-label">End</div><div class="card-value mono">${r.end_date}</div></div>` : ''}
      </div>`);
  }

  if (r.orders?.length) {
    const rows = r.orders.map(o => `
      <tr>
        <td>${o.order_number || '—'}</td>
        <td>${o.client || '—'}</td>
        <td>${o.role || '—'}</td>
        <td>${o.rate || '—'}</td>
        <td>${o.start_date || '—'} → ${o.end_date || '—'}</td>
        <td>${o.location || '—'}</td>
      </tr>`).join('');
    grid.innerHTML += cardFull('Orders / Appendices', `
      <div class="table-wrap">
        <table>
          <thead><tr><th>No.</th><th>Client</th><th>Role</th><th>Rate</th><th>Period</th><th>Location</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`);
  }

  if (r.risk_flags?.length) {
    grid.innerHTML += cardFull('Risk Flags', `
      <div class="flags-list">
        ${r.risk_flags.map(f => `<div class="flag-item">${f}</div>`).join('')}
      </div>`);
  }
}

function renderInvoiceCards(grid, r) {
  grid.innerHTML = '';

  if (r.total_amount) {
    grid.innerHTML += card('Total Amount', `<div class="card-value accent">${r.total_amount}</div>`);
  }

  if (r.invoice_number) {
    grid.innerHTML += card('Invoice Number', `<div class="card-value mono">${r.invoice_number}</div>`);
  }

  if (r.issue_date || r.due_date) {
    grid.innerHTML += card('Dates', `
      <div style="display:flex;gap:24px;">
        ${r.issue_date ? `<div><div class="card-label">Issued</div><div class="card-value mono">${r.issue_date}</div></div>` : ''}
        ${r.due_date ? `<div><div class="card-label">Due</div><div class="card-value mono">${r.due_date}</div></div>` : ''}
      </div>`);
  }

  if (r.variable_symbol) {
    grid.innerHTML += card('Variable Symbol', `<div class="card-value mono">${r.variable_symbol}</div>`);
  }

  if (r.supplier) {
    grid.innerHTML += card('Supplier', `
      <div class="entity-block">
        <div class="entity-name">${r.supplier.name || '—'}</div>
        ${r.supplier.address ? `<div class="entity-detail">${r.supplier.address}</div>` : ''}
        ${r.supplier.company_id ? `<div class="entity-detail">ID: ${r.supplier.company_id}</div>` : ''}
        ${r.supplier.vat_id ? `<div class="entity-detail">VAT: ${r.supplier.vat_id}</div>` : ''}
        ${r.supplier.iban ? `<div class="entity-detail">IBAN: ${r.supplier.iban}</div>` : ''}
      </div>`);
  }

  if (r.client) {
    grid.innerHTML += card('Client', `
      <div class="entity-block">
        <div class="entity-name">${r.client.name || '—'}</div>
        ${r.client.address ? `<div class="entity-detail">${r.client.address}</div>` : ''}
        ${r.client.company_id ? `<div class="entity-detail">ID: ${r.client.company_id}</div>` : ''}
        ${r.client.vat_id ? `<div class="entity-detail">VAT: ${r.client.vat_id}</div>` : ''}
      </div>`);
  }

  if (r.subtotal || r.vat_rate || r.vat_amount) {
    grid.innerHTML += card('VAT Summary', `
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${r.subtotal ? `<div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:var(--muted)">Subtotal</span><span>${r.subtotal}</span></div>` : ''}
        ${r.vat_rate ? `<div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:var(--muted)">VAT (${r.vat_rate})</span><span>${r.vat_amount || '—'}</span></div>` : ''}
        <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:600;border-top:1px solid var(--border);padding-top:8px;"><span>Total</span><span style="color:var(--accent)">${r.total_amount || '—'}</span></div>
      </div>`);
  }

  if (r.line_items?.length) {
    const rows = r.line_items.map(item => `
      <tr>
        <td>${item.description || '—'}</td>
        <td style="text-align:right">${item.quantity || '—'}</td>
        <td>${item.unit || '—'}</td>
        <td style="text-align:right">${item.unit_price || '—'}</td>
        <td style="text-align:right;font-weight:500">${item.total || '—'}</td>
      </tr>`).join('');
    grid.innerHTML += cardFull('Line Items', `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Description</th><th style="text-align:right">Qty</th><th>Unit</th><th style="text-align:right">Unit Price</th><th style="text-align:right">Total</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`);
  }

  if (r.flags?.length) {
    grid.innerHTML += cardFull('Flags', `
      <div class="flags-list">
        ${r.flags.map(f => `<div class="flag-item info">${f}</div>`).join('')}
      </div>`);
  }

  if (r.notes) {
    grid.innerHTML += cardFull('Notes', `<div class="card-value" style="font-size:13px;color:var(--muted)">${r.notes}</div>`);
  }
}

function card(label, content) {
  return `<div class="card"><div class="card-label">${label}</div>${content}</div>`;
}

function cardFull(label, content) {
  return `<div class="card full"><div class="card-label">${label}</div>${content}</div>`;
}

function toggleJson(btn) {
  const block = document.getElementById('jsonBlock');
  const visible = block.style.display === 'block';
  block.style.display = visible ? 'none' : 'block';
  btn.textContent = visible ? 'Show raw JSON' : 'Hide raw JSON';
}
</script>
</body>
</html>
